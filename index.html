<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

    <div class="bookForm">

        <button command="show-modal" commandfor="my-dialog">New Book</button>

        <dialog id="my-dialog">
            <form class="formCard">
                <label for="book_title"> Book Title: </label>
                <input type="text" id="book_title" required>

                <label for="book_author">Book Author</label>
                <input type="text" id="book_author" required>

                <label for="pageCount">Page Count</label>
                <input type="number" id="pageCount" required>

                <label for="isRead">Is Read</label>
                <button id="isRead" class="isRead" type="button"> Read </button>


                <button type="submit" class="submit"> Submit </button>
                
            </form>
            <button commandfor="my-dialog" command="close">Close</button>
        </dialog>

    </div>

    


     <div class="bookContainer"></div>


<script src="script.js"></script>
</body>
</html>
