<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

<div class="mainContainer">
    <div class="header">

        <button class="addBook"> Add Book </button>

    </div>

    <div class="form hide">
        <div class="formBackground"></div>
        <form class="formCard">
            <label for="book_title"> Book Title: </label>
            <input type="text" id="book_title">

            <label for="book_author">Book Author</label>
            <input type="text" id="book_author">

            <label for="pageCount">Page Count</label>
            <input type="number" id="pageCount">

            <label for="isRead">Is Read</label>
            <input type="checkbox" id="isRead">


            <button type="button" class="submit"> Submit </button>
            <button type="button" class="cancel"> Cancel </button>
        </form>
    </div>

    <div class="bookContainer"></div>

    <div class="footer"></div></div>

</div>
    <script src="script.js"></script>
</body>
</html>
